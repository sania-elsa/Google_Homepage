<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Google Homepage Clone">
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Top Navigation Area -->
    <header class="top-nav">
        <div class="nav-left">
            <a href="#">About</a>
            <a href="#">Store</a>
        </div>
        <div class="nav-right">
            <a href="#">Gmail</a>
            <a href="#">Images</a>
            <div class="icon-btn" title="Google apps">
                <!-- App Grid Icon -->
                <svg focusable="false" viewBox="0 0 24 24">
                    <path
                        d="M6,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM16,6c0,1.1 0.9,2 2,2s2,-0.9 2,-2 -0.9,-2 -2,-2 -2,0.9 -2,2zM12,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2z">
                    </path>
                </svg>
            </div>
            <div class="profile-icon">A</div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="content">
        <div class="logo">
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png"
                alt="Google Logo">
        </div>

        <div class="search-container">
            <div class="search-bar">
                <div class="search-icon-left">
                    <div class="plus-icon">
                        <!-- Plus Icon -->
                        <svg focusable="false" viewBox="0 0 24 24">
                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"></path>
                        </svg>
                        <div class="plus-popup">
                            <div class="popup-item">Upload Image</div>
                            <div class="popup-item">Upload File</div>
                        </div>
                    </div>
                </div>

                <div class="search-input-wrapper">
                    <input type="text" id="search-input" autocomplete="off" title="Search">
                </div>

                <div class="search-icons-right">
                    <div class="icon-btn mic-btn" id="mic-btn" title="Search by voice">
                        <!-- Microphone Icon -->
                        <svg focusable="false" viewBox="0 0 24 24">
                            <path fill="#4285f4"
                                d="m12 15c1.66 0 3-1.31 3-2.97v-7.02c0-1.66-1.34-3.01-3-3.01s-3 1.34-3 3.01v7.02c0 1.66 1.34 2.97 3 2.97z">
                            </path>
                            <path fill="#34a853" d="m11 18.08h2v3.92h-2z"></path>
                            <path fill="#fbbc05"
                                d="m7.05 16.87c-1.27-1.33-2.05-2.83-2.05-4.87h2c0 1.45 0.56 2.42 1.47 3.38v0.32l-1.15 1.18z">
                            </path>
                            <path fill="#ea4335"
                                d="m12 16.93a4.97 5.25 0 0 1 -3.54 -1.55l-1.41 1.49c1.26 1.34 3.02 2.13 4.95 2.13 3.87 0 6.99-2.92 6.99-7h-1.99c0 2.92-2.24 4.93-5 4.93z">
                            </path>
                        </svg>
                    </div>
                    <div class="icon-btn camera-btn" id="camera-btn" title="Search by image">
                        <!-- Camera/Lens Icon -->
                        <svg focusable="false" viewBox="0 0 24 24">
                            <path fill="#4285f4"
                                d="M12 15.5C14.21 15.5 16 13.71 16 11.5 16 9.29 14.21 7.5 12 7.5 9.79 7.5 8 9.29 8 11.5 8 13.71 9.79 15.5 12 15.5zM12 9.5C13.1 9.5 14 10.4 14 11.5 14 12.6 13.1 13.5 12 13.5 10.9 13.5 10 12.6 10 11.5 10 10.4 10.9 9.5 12 9.5z">
                            </path>
                            <path fill="#34a853"
                                d="M12 17.5C10.22 17.5 8.6 16.71 7.52 15.48L6 17C7.4 18.66 9.56 19.5 12 19.5 16.42 19.5 20 15.92 20 11.5H18C18 14.81 15.31 17.5 12 17.5z">
                            </path>
                            <path fill="#fbbc05" d="M4 11.5C4 9.56 4.84 7.4 6.5 6L5.02 4.48C2.86 6.34 2 9 2 11.5H4z">
                            </path>
                            <path fill="#ea4335"
                                d="M12 3.5C14.69 3.5 17.19 4.69 19.06 6.42L20.54 4.94C18.23 2.76 15.22 1.5 12 1.5 7.58 1.5 4 5.08 4 9.5H6C6 6.19 8.69 3.5 12 3.5z">
                            </path>
                        </svg>
                    </div>
                    <div class="ai-button">
                        <!-- AI Star Icon Context -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M12 2v2M12 20v2M5.93 5.93l1.41 1.41M16.66 16.66l1.41 1.41M2 12h2M20 12h2M5.93 18.07l1.41-1.41M16.66 7.34l1.41-1.41M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" />
                        </svg>
                        <span>AI Mode</span>
                    </div>
                </div>
            </div>

            <div class="search-history-dropdown" id="search-history-dropdown">
                <hr class="dropdown-divider">
                <ul id="history-list">
                    <!-- Dynamic search history will be placed here -->
                </ul>
            </div>
        </div>

        <!-- Hidden input for file upload simulation -->
        <input type="file" id="file-upload" style="display: none;">

        <div class="buttons">
            <button class="action-btn" id="google-search-btn">Google Search</button>
            <button class="action-btn" id="lucky-btn">I'm Feeling Lucky</button>
        </div>

        <div class="languages">
            Google offered in:
            <a href="#">हिन्दी</a>
            <a href="#">മലയാളം</a>
            <a href="#">தமிழ்</a>
            <a href="#">తెలుగు</a>
            <a href="#">ಕನ್ನಡ</a>
        </div>
    </main>

    <!-- Footer Area -->
    <footer>
        <div class="footer-top">
            <p>India</p>
        </div>
        <div class="footer-bottom">
            <div class="footer-left">
                <a href="#">About</a>
                <a href="#">Advertising</a>
                <a href="#">Business</a>
                <a href="#">How Search works</a>
            </div>
            <div class="footer-right">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
